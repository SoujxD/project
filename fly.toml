app = "ise547-analytics-api"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  ENABLE_SENTENCE_TRANSFORMERS = "false"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "20s"
    timeout = "10s"
    grace_period = "90s"
    method = "GET"
    path = "/health"
    protocol = "http"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1
